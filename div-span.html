<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div-span</title>

    <style>

        #topo {
            background-color: rgb(233, 93, 47);
            color: white;
            padding: 10px;
            text-align: hight;
        }

        #conteudo {
            background-color: rgb(46, 48, 214);
            color: white;
            padding: 10px;
            text-align: hight;
        }
        .produto {
            background-color: rgb (248, 245, 245);
            color: rgb (248, 245, 245);
            padding: 10px;
            margin-bottom: 10px;
        }

        #rodape {
            background-color: rgb (248, 245, 245);
            color: rgb (248, 245,245);
            padding: 10px;
            text-align: center;
        }

        #assinatura {
            background-color: aliceblue;
            color: white;
            font-size: 15px;

        }


    </style>
</head>
<body>
    
    <div id="topo">
        <img src="imagem/Logo MW.png" alt="" width="300px">
        <div>
            <ul>
                <li>Home</li>
                <li>Curso</li>
                <li>Contato</li>
            </ul>
            
        </div>

    </div>
    <div id="conteudo">
        <div>
            <div class="produto">
                Produto 1
            </div>

        </div>
        <div>
            <div class="produto">
             Produto 2

            </div>
        </div>
        <div>
            <div class="produto">
             Produto 3

            </div>
        </div>

    </div>
    <div id="rodape">
        &copy;Marcelo Wanderley 2026 - Todos os direitos reservados.
    </div>
    <div>
        <span id="assinatura">Desenvolvedor</span>

    </div>
</body>
</html>
